   <div class="cards">
    <span><h2>Book Event</h2></span>

    
<div class="container">
  <form class="booking-form">

    <h3><strong>SELECT SERVICE </strong></h3>

    <div class="services">
      <div class="service">📷 Portrait</div>
      <div class="service">💍 Wedding</div>
      <div class="service">👗 Fashion</div>
      <div class="service">🏢 Commercial</div>
      <div class="service">👨‍👩‍👧 Family</div>
      <div class="service">🎉 Event</div>
    </div>

    <div class="row">
      <input type="text" placeholder="First Name *" class="h">
      <input type="text" placeholder="Last Name *" class="h">
    </div>

    <div class="row">
      <input type="email" placeholder="Email *" class="h">
      <input type="tel" placeholder="+91 Phone *" class="h">
    </div>

    <div class="row">
      <input type="date" class="h">
      <input type="time" class="h">
    </div>

    <input type="text" placeholder="Location / Venue" class="h">

    <select class="h">
      <option selected class="buget">Select your budget</option>
      <option class="buget">₹5,000 - ₹10,000</option>
      <option class="buget">₹10,000 - ₹25,000</option>
      <option class="buget">₹25,000+</option>
    </select>

    <textarea placeholder="Share your vision, mood, special requirements..." class="h"></textarea>

    <button type="submit">📅 Confirm Booking</button>

  </form>
